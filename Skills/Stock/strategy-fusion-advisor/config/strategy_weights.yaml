# config/strategy_weights.yaml

# 策略权重配置（可根据近期表现动态调整）
strategy_weights:
  # 固定权重（基于历史胜率）
  fixed_weights:
    pullback-to-ma-strategy: 1.00
    earnings-surprise-strategy: 1.05
    ma-bullish-strategy: 0.95
    limit-up-pullback-strategy: 0.95
    macd-divergence-strategy: 0.85
    morning-star-strategy: 0.85
    breakout-high-strategy: 0.95
    rsi-oversold-strategy: 0.80
    volume-extreme-strategy: 0.85
    gap-fill-strategy: 0.85
  
  # 动态调整参数
  dynamic_adjustment:
    enabled: true
    lookback_days: 30
    adjustment_range: 0.2        # 调整范围±20%
    
    # 近期表现奖励
    recent_performance_bonus:
      top_performer: 0.15
      good_performer: 0.10
      normal: 0.00
      poor_performer: -0.10
  
  # 市场环境调整
  market_adjustment:
    bull_market:
      trend_strategies: 1.20     # 趋势策略加成
      reversal_strategies: 0.80  # 反转策略减成
    
    bear_market:
      trend_strategies: 0.80
      reversal_strategies: 1.20
    
    range_market:
      trend_strategies: 1.00
      reversal_strategies: 1.00

# 策略类型分类
strategy_types:
  trend_following:
    - pullback-to-ma-strategy
    - ma-bullish-strategy
    - breakout-high-strategy
    - gap-fill-strategy
  
  reversal:
    - macd-divergence-strategy
    - morning-star-strategy
    - rsi-oversold-strategy
    - volume-extreme-strategy
  
  fundamental:
    - earnings-surprise-strategy
  
  momentum:
    - limit-up-pullback-strategy