# 缩量回踩策略定时任务配置
version: "v1.0.0"
description: "缩量回踩重要均线策略定时任务"

jobs:
  # 收盘后扫描
  - name: "收盘回踩扫描"
    schedule: "5 15 * * 1-5"  # 周一至周五 15:05
    enabled: true
    command: "python3 skills/scripts/retrace_scanner.py --scan --top 20"
    description: "收盘后扫描缩量回踩机会"
  
  # 盘前提醒
  - name: "盘前机会提醒"
    schedule: "15 9 * * 1-5"  # 周一至周五 9:15
    enabled: true
    command: "python3 skills/scripts/retrace_scanner.py --scan --top 10"
    description: "盘前提醒今日回踩机会"
  
  # 午盘监控
  - name: "午盘监控"
    schedule: "30 11 * * 1-5"  # 周一至周五 11:30
    enabled: false
    command: "python3 skills/scripts/retrace_scanner.py --scan --top 5"
    description: "午盘监控回踩机会"

# 节假日休市配置
