# config/risk_rules.yaml

# 早晨之星形态策略风险管理规则
version: "1.0.0"

# 止损规则
stop_loss_rules:
  pattern_low_stop:
    enabled: true
    condition: "close < pattern_lowest"
    description: "跌破早晨之星最低点止损"
  
  hard_stop:
    enabled: true
    percentage: 0.05
    description: "固定5%止损"
  
  ma_stop:
    enabled: true
    ma_period: 10
    description: "跌破10日线止损"
  
  time_stop:
    enabled: true
    days: 10
    min_profit: 0.02
    description: "持仓10天盈利<2%离场"

# 止盈规则
take_profit_rules:
  target_profit:
    enabled: true
    levels:
      - percentage: 0.10
        action: "减仓30%"
      - percentage: 0.15
        action: "减仓30%"
      - percentage: 0.20
        action: "清仓"
  
  trailing_stop:
    enabled: true
    percentage: 0.08
    description: "最高点回撤8%止盈"
  
  resistance_stop:
    enabled: true
    description: "遇到前期高点阻力止盈"

# 仓位管理
position_sizing:
  based_on_signal:
    strong: 0.25    # 评分≥85
    normal: 0.15    # 评分75-84
    weak: 0.10      # 评分70-74
  
  max_single_position: 0.25
  max_portfolio_risk: 0.06

# 过滤条件
filters:
  exclude_st: true
  exclude_new_stock: true
  min_price: 5
  max_price: 500