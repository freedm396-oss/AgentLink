# 风险控制规则

# 止损规则
stop_loss:
  fixed_pct: 0.06              # 固定止损 -6%
  trailing: true               # 是否启用移动止损
  trailing_trigger: "MA5 < MA10"
  trailing_keep_pct: 0.50      # 触发移动止盈时保留涨幅的50%

# 止盈规则
take_profit:
  target_pct: 0.20             # 目标止盈 +20%
  partial_exit:
    - level: 0.15              # +15% 卖出50%
      pct: 0.50
    - level: 0.18              # +18% 再卖25%
      pct: 0.25
    - level: 0.20              # +20% 清仓
      pct: 0.25

# 时间止损
time_stop:
  enabled: true
  max_days: 30                # 最大持仓30天
  profit_threshold: 0.02      # 持仓15天盈利<2%离场

# 市场环境过滤
market_filter:
  hsi_trend_required: true    # 是否要求恒指多头
  hsi_drop_threshold: 0.03    # 恒指单日跌超3%禁开新仓
  volume_filter: true         # 大盘成交额过滤

# 个股过滤
stock_filter:
  min_daily_volume: 50000000  # 日成交额 > 5000万
  min_price: 1.0              # 股价 > 1港元
  max_stocks_per_day: 5       # 每日最多开仓5只

# 仓位管理
position_size:
  default_pct: 0.10           # 单只仓位 10%
  max_total_pct: 0.50         # 总仓位 ≤ 50%
