# 评分体系权重配置

weights:
  ah_premium: 0.35     # AH溢价权重 35%
  volume_check: 0.25   # 量能验证权重 25%
  sector_trend: 0.20   # 行业趋势权重 20%
  hedge_cost: 0.20     # 对冲成本权重 20%

# 各维度评分细则
scoring:
  # AH溢价评分 (满分 100)
  ah_premium:
    extreme: 100            # 溢价 > 80%（极度折价）
    high: 80                # 溢价 50-80%
    good: 70                # 溢价 40-50%（入场区间）
    moderate: 50            # 溢价 30-40%
    low: 20                 # 溢价 < 30%

  # 量能验证评分 (满分 100)
  volume_check:
    both_strong: 100        # A+H股量能均充足
    h_strong: 70            # 仅H股充足
    a_strong: 50            # 仅A股充足
    both_weak: 10           # 双方不足

  # 行业趋势评分 (满分 100)
  sector_trend:
    strong_uptrend: 100     # 行业指数明显上升
    mild_uptrend: 70        # 行业指数温和上升
    sideways: 50             # 行业指数震荡
    downtrend: 20           # 行业指数下降

  # 对冲成本评分 (满分 100)
  hedge_cost:
    low: 100                # 对冲成本低
    medium: 70              # 对冲成本中等
    high: 40                # 对冲成本高
    very_high: 10           # 对冲成本极高

# 综合评分等级
rating:
  very_strong: 85           # ≥85 极强
  strong: 75                # 75-84 强
  medium: 70                # 70-74 中等
  weak: 0                   # <70 弱
