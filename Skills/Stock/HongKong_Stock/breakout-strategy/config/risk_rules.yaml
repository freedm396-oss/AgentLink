# 风险控制规则

# 止损规则
stop_loss:
  fixed_pct: 0.05              # 固定止损 -5%
  trailing: true               # 启用移动止损
  trailing_trigger: "volume_shrink_30pct"
  trailing_keep_pct: 0.50      # 触发时保留涨幅的50%

# 止盈规则
take_profit:
  target_pct: 0.12             # 目标止盈 +12%
  volume_shrink_exit: true     # 量能萎缩30%止盈
  partial_exit:
    - level: 0.08               # +8% 卖出 50%
      pct: 0.50
    - level: 0.12               # +12% 清仓
      pct: 0.50

# 时间止损
time_stop:
  enabled: true
  max_days: 20                # 最大持仓20天
  profit_threshold: 0.03     # 持仓10天盈利<3%离场

# 市场环境过滤
market_filter:
  hsi_trend_required: false   # 突破策略不强制要求大盘多头
  volume_filter: true          # 大盘成交额需正常

# 个股过滤
stock_filter:
  min_daily_volume: 50000000  # 日成交额 > 5000万
  min_price: 1.0              # 股价 > 1港元
  avoid_rsi_overbought: true  # RSI>80 避免追高

# 仓位管理
position_size:
  default_pct: 0.10           # 单只仓位 10%
  max_total_pct: 0.50         # 总仓位 ≤ 50%
  max_positions: 5            # 同时持仓最多5只
