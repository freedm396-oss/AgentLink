# 港股分红除权博弈策略 - Agent 配置
name: hk-dividend-exright-agent
description: 港股分红除权博弈策略分析 Agent
strategy: dividend-exright-strategy

model: minimax/MiniMax-M2.7
thinking: low

skills:
  - path: ../dividend-exright-strategy/SKILL.md
    enabled: true

tools:
  - web_search
  - web_fetch
  - exec

triggers:
  - cron: "0 9 30 * * 1-5"    # 每周一到周五 9:30 开盘前扫描
  - cron: "0 9 0 * * 1-5"     # 每周一到周五 9:00 除权日开盘检查
  - cron: "0 10 30 * * 6"     # 每周六 10:30 周末复盘

actions:
  - scan_dividend_exright_opportunities
  - monitor_exright_positions
  - dividend_exright_alerts
