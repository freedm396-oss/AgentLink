# 评分体系权重配置

weights:
  dividend_yield: 0.30      # 股息率权重 30%
  dividend_history: 0.25   # 分红历史权重 25%
  timing_window: 0.25      # 时机窗口权重 25%
  market_env: 0.20        # 市场环境权重 20%

# 各维度评分细则
scoring:
  # 股息率评分 (满分 100)
  dividend_yield:
    very_high: 100            # 股息率 > 10%
    high: 80                 # 股息率 7-10%
    good: 70                 # 股息率 5-7%（入场区间）
    moderate: 50             # 股息率 3-5%
    low: 20                  # 股息率 < 3%

  # 分红历史评分 (满分 100)
  dividend_history:
    excellent: 100            # 连续 10+ 年分红
    very_good: 80             # 连续 7-10 年
    good: 70                 # 连续 5-7 年（入场区间）
    moderate: 50             # 连续 3-5 年
    poor: 20                 # < 3 年

  # 时机窗口评分 (满分 100)
  timing_window:
    perfect: 100              # 距除权 3-5 日（最佳）
    good: 80                 # 距除权 1-2 日
    acceptable: 60           # 除权当日
    too_early: 40           # 距除权 6-10 日
    too_late: 20             # 已除权

  # 市场环境评分 (满分 100)
  market_env:
    bull: 100               # 大市上升趋势
    neutral: 70             # 大市震荡
    uncertain: 50           # 大市方向不明
    crash: 10               # 大市急跌（放弃）

# 综合评分等级
rating:
  very_strong: 85           # ≥85 极强
  strong: 75                # 75-84 强
  medium: 70                # 70-74 中等
  weak: 0                   # <70 弱
