# 风险控制规则

# 止损规则
stop_loss:
  fixed_pct: 0.07              # 固定止损 -7%
  trailing: true               # 启用移动止损
  trailing_trigger: "short_ratio < 15%"
  trailing_keep_pct: 0.50      # 触发时保留涨幅的50%

# 止盈规则
take_profit:
  target_pct: 0.18             # 目标止盈 +18%
  short_ratio_exit: true       # 沽空比率 < 15% 触发止盈
  partial_exit:
    - level: 0.10              # +10% 卖出 50%
      pct: 0.50
    - level: 0.18               # +18% 清仓
      pct: 0.50

# 时间止损
time_stop:
  enabled: true
  max_days: 25                # 最大持仓25天
  profit_threshold: 0.03     # 持仓15天盈利<3%离场

# 市场环境过滤
market_filter:
  avoid_crash_days: true     # 恒指单日跌超3%后次日避免开仓
  short_data_delay_note: "沽空数据T+2披露，注意延迟"

# 个股过滤
stock_filter:
  min_daily_volume: 50000000  # 日成交额 > 5000万
  min_market_cap: 100        # 市值 > 100亿港元
  min_price: 1.0             # 股价 > 1港元
  exclude_high_debt: true     # 排除高负债股

# 仓位管理
position_size:
  default_pct: 0.08           # 单只仓位 8%（高风险策略控仓）
  max_total_pct: 0.40         # 总仓位 ≤ 40%
  max_positions: 4            # 同时持仓最多4只
