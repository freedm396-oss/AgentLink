# 评分体系权重配置

weights:
  short_high: 0.30       # 沽空高度权重 30%
  reversal_confirm: 0.30  # 反转确认权重 30%
  volume_surge: 0.20      # 量能验证权重 20%
  market_cap: 0.20        # 市值验证权重 20%

# 各维度评分细则
scoring:
  # 沽空高度评分 (满分 100)
  short_high:
    extreme: 100            # 沽空 > 35%
    high: 80                 # 沽空 25-35%
    moderate: 50             # 沽空 20-25%
    low: 20                  # 沽空 < 20%

  # 反转确认评分 (满分 100)
  reversal_confirm:
    strong: 100              # 连续下降 >= 3日
    good: 80                 # 连续下降 2日
    weak: 50                 # 仅下降1日
    no_reversal: 0           # 仍在上升

  # 量能验证评分 (满分 100)
  volume_surge:
    explosive: 100           # 量能 > 均量 × 3
    strong: 80                # 量能 > 均量 × 1.5
    moderate: 50              # 量能 > 均量 × 1.2
    weak: 20                  # 量能不足

  # 市值验证评分 (满分 100)
  market_cap:
    very_large: 100          # > 500亿
    large: 80                 # 100-500亿
    mid: 50                   # 50-100亿
    small: 20                 # < 50亿

# 综合评分等级
rating:
  very_strong: 85            # ≥85 极强
  strong: 75                 # 75-84 强
  medium: 70                 # 70-74 中等
  weak: 0                   # <70 弱
