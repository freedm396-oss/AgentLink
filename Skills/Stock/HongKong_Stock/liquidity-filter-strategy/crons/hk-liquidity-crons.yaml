# 港股流动性过滤策略 - 定时任务配置

crons:
  # 每日开盘前全市场扫描
  - name: "开盘前流动性扫描"
    schedule: "0 9 15 * * 1-5"    # 每周一到周五 9:15
    action: scan_all_stocks_liquidity
    description: 开盘前扫描全市场港股流动性，过滤仙股

  # 盘后流动性复检
  - name: "盘后流动性复检"
    schedule: "0 14 45 * * 1-5"   # 每周一到周五 14:45
    action: check_intraday_liquidity
    description: 盘后检查持仓股的日内流动性是否出现异常

  # 周末流动性综合报告
  - name: "周末流动性报告"
    schedule: "0 10 0 * * 6"      # 每周六 10:00
    action: generate_weekly_liquidity_report
    description: 生成全周流动性统计报告，识别边缘标的
