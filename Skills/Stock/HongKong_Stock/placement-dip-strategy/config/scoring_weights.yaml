# 评分体系权重配置

weights:
  discount_depth: 0.25       # 折价深度权重 25%
  drop_magnitude: 0.25     # 跌幅区间权重 25%
  fund_usage: 0.25          # 资金用途权重 25%
  institutional: 0.25       # 机构背书权重 25%

# 各维度评分细则
scoring:
  # 折价深度评分 (满分 100)
  discount_depth:
    extreme: 100             # 折让 > 20%（极度便宜）
    high: 80                # 折让 15-20%
    good: 70                # 折让 10-15%（最佳区间）
    moderate: 60             # 折让 5-10%
    weak: 20                # 折让 < 5%

  # 跌幅区间评分 (满分 100)
  drop_magnitude:
    ideal: 100               # 跌幅 -10% ~ -15%（超跌区间）
    good: 80                 # 跌幅 -8% ~ -10%
    acceptable: 60           # 跌幅 -5% ~ -8%
    too_small: 30           # 跌幅 < -5%
    too_large: 0             # 跌幅 > -15%（放弃）

  # 资金用途评分 (满分 100)
  fund_usage:
    excellent: 100           # 扩张/并购/研发
    good: 80                 # 产能扩张
    neutral: 50              # 一般运营
    bad: 20                  # 偿债

  # 机构背书评分 (满分 100)
  institutional:
    top_tier: 100            # ≥5家知名机构
    good: 80                # 3-4家知名机构
    few: 50                 # 1-2家
    none: 0                 # 无机构参与

# 综合评分等级
rating:
  very_strong: 85           # ≥85 极强
  strong: 75                # 75-84 强
  medium: 70                # 70-74 中等
  weak: 0                   # <70 弱
