# 风险控制规则

# 止损规则
stop_loss:
  fixed_pct: 0.06              # 固定止损 -6%
  abort_next_day: 0.03         # 次日再跌3%放弃
  trailing: true                # 启用移动止盈
  trailing_keep_pct: 0.50      # 保留涨幅50%

# 止盈规则
take_profit:
  target_pct: 0.12             # 目标止盈 +12%
  partial_exit:
    - level: 0.08               # +8% 卖出 50%
      pct: 0.50
    - level: 0.12               # +12% 清仓
      pct: 0.50

# 时间止损
time_stop:
  enabled: true
  max_days: 15                # 最大持仓15日
  check_days: 3               # 每3日检查一次

# 市场环境过滤
market_filter:
  avoid_crash_days: true      # 大盘单日跌超3%时不开新仓
  volume_filter: true        # 大盘成交额需正常

# 个股过滤
stock_filter:
  min_market_cap_m: 5000   # 市值 > 50亿港元
  min_volume: 20000000      # 日成交 > 2000万
  exclude_st: true          # 排除ST股
  exclude_debt_placement: true  # 排除用于偿债的配股

# 配股信息验证
placement_filter:
  verify_price: true          # 验证配股价合理
  verify_volume: true         # 验证配股规模合理
  exclude_right_issue: false  # 排除供股（配股优先）
  min_discount: 0.05          # 折让 > 5%

# 仓位管理
position_size:
  default_pct: 0.10           # 单只仓位 10%
  max_total_pct: 0.40        # 总仓位 ≤ 40%
  max_positions: 4           # 同时持仓最多4只
