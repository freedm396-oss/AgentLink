# 止损紧迫度评分体系

weights:
  loss_depth: 0.40       # 亏损深度权重 40%
  daily_loss: 0.25     # 单日亏损权重 25%
  holding_period: 0.20 # 持仓期限权重 20%
  weekly_loss: 0.15   # 周亏损权重 15%

# 各维度评分细则
scoring:
  # 亏损深度评分 (紧迫度)
  loss_depth:
    critical: 100           # 亏损 >= 7%（立即止损）
    severe: 80            # 亏损 5-7%
    warning: 60           # 亏损 3-5%
    caution: 40           # 亏损 1-3%
    safe: 0              # 亏损 < 1%

  # 单日亏损评分
  daily_loss:
    critical: 100           # 单日亏损 >= 3%
    severe: 80            # 单日亏损 2-3%
    warning: 60           # 单日亏损 1-2%
    caution: 40           # 单日亏损 0.5-1%
    safe: 0              # 单日亏损 < 0.5%

  # 持仓期限评分
  holding_period:
    overdue: 100             # 超20日（强制平仓）
    near_term: 80           # 15-20日
    moderate: 50           # 10-15日
    early: 20             # 5-10日
    safe: 0               # < 5日

  # 周亏损评分
  weekly_loss:
    critical: 100             # 周亏损 >= 10%
    severe: 80             # 周亏损 7-10%
    warning: 60             # 周亏损 5-7%
    caution: 40             # 周亏损 3-5%
    safe: 0               # 周亏损 < 3%

# 综合紧迫度等级
urgency:
  IMMEDIATE_EXIT: 85       # ≥85 立即退出
  REDUCE_POSITION: 70     # 70-84 减仓
  CLOSE_WATCH: 60        # 60-69 密切观察
  SAFE: 0                # <60 安全持仓
