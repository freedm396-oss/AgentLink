# 做空止损策略参数配置

strategy:
  name: "港股做空止损策略"
  version: "1.0.0"
  type: "risk_management"

# 止损参数（三层防线）
stop_loss:
  # 第1层：硬止损（无条件执行）
  hard_stop_loss_pct: 0.07        # 亏损 7% 立即卖出

  # 第2层：单日止损（减仓保护）
  daily_loss_pct: 0.03           # 单日亏损 3% 减仓50%
  reduce_position_pct: 0.50      # 减仓比例 50%

  # 第3层：周度止损（清仓所有）
  weekly_loss_pct: 0.10         # 周亏损 10% 清仓

# 持仓期限
holding:
  max_days: 20                  # 最大持仓 20个交易日
  force_exit_day: 20            # 到期强制平仓

# 冷却期
cooling:
  enabled: true
  block_days: 3                 # 止损后禁止开新仓 3个交易日

# 止损执行
execution:
  method: "market_order"         # 市价单执行
  partial_allowed: true          # 允许分批卖出
  confirm_required: false        # 是否需要确认

# 适用场景
scenarios:
  - "所有港股多头持仓的前置风控"
  - "任何开仓后的必检项"
  - "每日盘前/盘后必检"
