# 回购公告跟进策略参数配置

strategy:
  name: "港股回购公告跟进策略"
  version: "1.0.0"

# 回购参数
buyback:
  announcement_window_days: 7     # 公告时效：7日内
  price_discount_threshold: 0.05  # 入场偏离：低于回购均价5%
  min_ratio_threshold: 0.001     # 最低规模：占总股本 0.1%
  historical_years: 2            # 历史合规期：2年
  historical_min_programs: 3      # 历史合规：至少3次回购

# 股价参数
price:
  use_next_open: true            # 入场价：次日开盘

# 止损止盈
risk:
  stop_loss_pct: 0.05            # 止损 -5%
  take_profit_pct: 0.10          # 止盈 +10%
  exit_at_avg_price: true        # 股价>回购均价止盈

# 持仓参数
holding:
  max_days: 20                   # 最大持仓20日
  check_interval_days: 3         # 每3日检查一次

# 过滤条件
filters:
  min_market_cap: 1000          # 最低市值 10亿港元
  min_daily_volume: 10000000    # 日成交额 > 1000万
  exclude_st: true              # 排除ST股
  market: "港股"                # 适用市场
