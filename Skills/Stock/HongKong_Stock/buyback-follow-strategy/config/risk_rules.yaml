# 风险控制规则

# 止损规则
stop_loss:
  fixed_pct: 0.05              # 固定止损 -5%
  trailing: true                # 启用移动止盈
  trailing_keep_pct: 0.50      # 保留涨幅50%

# 止盈规则
take_profit:
  target_pct: 0.10             # 目标止盈 +10%
  exit_at_avg: true             # 股价 > 回购均价止盈
  partial_exit:
    - level: 0.05               # +5% 卖出 50%
      pct: 0.50
    - level: 0.10               # +10% 清仓
      pct: 0.50

# 时间止损
time_stop:
  enabled: true
  max_days: 20                # 最大持仓20日
  check_days: 3               # 每3日检查一次

# 市场环境过滤
market_filter:
  avoid_crash: true           # 恒指单日跌超3%后避免开仓
  volume_filter: true         # 大盘成交额需正常

# 个股过滤
stock_filter:
  min_market_cap_m: 1000    # 市值 > 10亿港元
  min_volume: 10000000       # 日成交 > 1000万
  exclude_st: true           # 排除ST股
  exclude_poor_history: true  # 排除历史违规公司

# 回购信息验证
buyback_filter:
  exclude_incentive_only: true  # 排除仅用于员工激励的回购
  verify_fund_source: true      # 验证资金来源（自有资金>银行贷款）
  min_price_reported: true      # 回购价需高于当前价

# 仓位管理
position_size:
  default_pct: 0.10           # 单只仓位 10%
  max_total_pct: 0.50         # 总仓位 ≤ 50%
  max_positions: 5           # 同时持仓最多5只
