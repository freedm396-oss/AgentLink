# crons/volume-extreme-crons.yaml

version: "1.0.0"
description: "成交量地量见底策略定时任务"

crons:
  # 收盘后扫描 - 15:30
  - name: "afternoon-volume-extreme-scan"
    schedule: "30 15 * * 1-5"
    agent: "volume-extreme-agent"
    enabled: true
    prompt: |
      扫描今日出现地量的股票。
      重点关注：
      1. 成交量<40%均量的股票
      2. 处于阶段性低位的股票
      3. 出现企稳信号的股票
      输出前10只评分最高的股票。
  
  # 次日确认监控 - 10:00
  - name: "next-day-volume-confirmation"
    schedule: "0 10 * * 1-5"
    agent: "volume-extreme-agent"
    enabled: true
    prompt: |
      监控昨日地量股票今日表现。
      重点关注：
      1. 是否出现放量阳线
      2. 价格是否企稳
      3. 是否出现买入机会
  
  # 持仓跟踪 - 14:30
  - name: "position-volume-tracking"
    schedule: "30 14 * * 1-5"
    agent: "volume-extreme-agent"
    enabled: true
    prompt: |
      跟踪地量策略持仓股票。
      检查：
      1. 是否触发止损
      2. 是否达到止盈目标
      3. 成交量是否健康

execution:
  timeout: 300
  retry: 3
  notification:
    on_success: false
    on_failure: true