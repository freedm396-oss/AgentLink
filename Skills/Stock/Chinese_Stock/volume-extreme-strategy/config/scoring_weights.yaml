# 成交量地量见底策略评分权重配置
# 参考涨停板策略的市场评分标准
# 总权重应为 100%

version: "1.1.0"

weights:
  volume_extreme: 0.30      # 地量程度 (30%)
  price_position: 0.25      # 价格位置 (25%)
  stability_signal: 0.20    # 企稳信号 (20%)
  follow_up: 0.15           # 后续确认 (15%)
  market_environment: 0.10  # 市场环境 (10%)

# 地量程度评分标准
volume_extreme:
  extreme: 100      # 缩量<15%，极度地量
  strong: 85        # 缩量15-25%，严重地量
  normal: 70        # 缩量25-35%，明显地量
  mild: 55          # 缩量35-45%，轻度地量
  none: 40          # 未明显缩量

# 价格位置评分标准
price_position:
  excellent: 100    # 处于60日低位区间(0-20%)
  good: 85          # 处于60日低位区间(20-30%)
  normal: 70        # 处于60日中低位(30-40%)
  fair: 55          # 处于60日中部(40-50%)
  poor: 40          # 处于60日高位(>50%)

# 企稳信号评分标准
stability_signal:
  strong: 100       # 地量后连续3日不创新低且K线收窄
  good: 80          # 地量后2日不创新低
  normal: 60        # 地量后1日不创新低或轻度下跌
  weak: 40          # 继续下跌

# 后续确认评分标准
follow_up:
  strong: 100       # 地量后放量上涨>5%
  good: 85          # 地量后放量上涨3-5%
  normal: 70        # 地量后温和上涨
  weak: 60          # 量能有放大但未确认
  none: 45          # 无明显后续信号

# 市场环境评分标准（参考涨停板策略）
market_environment:
  excellent: 100    # 大盘大涨，情绪极好
  good: 80          # 大盘上涨，情绪良好
  normal: 60        # 大盘震荡，情绪中性
  poor: 40          # 大盘下跌，情绪低迷
  bad: 20           # 大盘大跌，情绪极差

# 评分等级（与涨停板策略一致）
categories:
  excellent:
    min_score: 85
    label: "极高"
    description: "地量见底信号强烈，重点关注"
  good:
    min_score: 75
    label: "高"
    description: "地量见底可能性大"
  average:
    min_score: 65
    label: "中等"
    description: "需结合盘面判断"
  poor:
    min_score: 55
    label: "低"
    description: "谨慎参与"
  very_poor:
    min_score: 0
    label: "极低"
    description: "建议观望"

# 数据缓存配置
cache:
  ttl_minutes: 5                   # 缓存有效期（分钟）
  max_history_days: 90             # 历史数据保留天数
