# 风险管理规则
risk_management:
  # 止损设置
  stop_loss:
    method: "support_break"      # 跌破支撑位止损
    fixed_pct: 0.07              # 固定7%止损
    support_buffer_pct: 0.03     # 支撑位下方3%缓冲
  
  # 止盈设置
  take_profit:
    method: "limit_up_target"    # 以涨停价为目标
    target1: 0.10                # 第一目标10%
    target2: 0.15                # 第二目标15%
    target3: 0.20                # 第三目标20%
    trailing_stop: true          # 启用移动止盈
    trailing_pct: 0.06           # 回撤6%止盈
  
  # 时间止损
  time_stop:
    enabled: true
    max_holding_days: 5          # 最多持有5天
    exit_if_no_move: true        # 无表现则离场

# 风险控制规则
risk_limits:
  max_single_position: 0.15      # 单只股票最大仓位15%
  max_sector_exposure: 0.40      # 单一行业最大暴露40%
  max_daily_trades: 3            # 每日最大交易次数
  max_concurrent_positions: 6    # 最大持仓数量

# 仓位管理
position_sizing:
  base_position: 0.10            # 基础仓位10%
  score_adjustment: true         # 根据评分调整仓位
  high_score_bonus: 0.05         # 高分股票额外5%
  low_score_penalty: 0.03        # 低分股票减少3%
