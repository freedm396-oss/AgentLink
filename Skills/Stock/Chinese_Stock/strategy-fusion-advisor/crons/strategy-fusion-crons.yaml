# crons/strategy-fusion-crons.yaml

version: "1.0.0"
description: "策略融合投资顾问定时任务"

crons:
  # 盘后融合推荐 - 16:00
  - name: "afternoon-fusion-recommendation"
    schedule: "0 16 * * 1-5"
    agent: "strategy-fusion-advisor"
    enabled: true
    prompt: |
      收集今日11个策略的推荐股票，
      进行综合评分计算，
      输出Top5推荐股票及仓位建议。
  
  # 早盘确认 - 9:15
  - name: "morning-portfolio-confirmation"
    schedule: "15 9 * * 1-5"
    agent: "strategy-fusion-advisor"
    enabled: true
    prompt: |
      确认今日投资组合。
      检查：
      1. 是否有重大消息影响
      2. 开盘价是否在合理区间
      3. 调整买入计划
  
  # 周度组合回顾 - 周五16:30
  - name: "weekly-portfolio-review"
    schedule: "30 16 * * 5"
    agent: "strategy-fusion-advisor"
    enabled: true
    prompt: |
      生成本周投资组合回顾报告。
      包括：
      1. 组合表现分析
      2. 策略贡献度
      3. 下周展望
      4. 权重调整建议

execution:
  timeout: 600
  retry: 2
  notification:
    on_success: true
    on_failure: true