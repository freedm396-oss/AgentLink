# limit-up-analysis/crons/limit-up-crons.yaml
# 涨停板连板分析定时任务配置
# 交易日自动抓取和分析

version: "v1.1.0"
description: "涨停板连板分析定时任务"

jobs:
  # 早盘数据抓取 (9:30)
  - name: "早盘涨停数据抓取"
    schedule: "30 9 * * 1-5"  # 周一至周五 9:30
    enabled: true
    command: "python skills/limit_up/scripts/analyzer.py --all --save"
    description: "抓取并分析当日早盘涨停股票，使用自动选择的最佳数据源"
    
  # 午盘数据更新 (13:00)
  - name: "午盘涨停数据更新"
    schedule: "0 13 * * 1-5"  # 周一至周五 13:00
    enabled: true
    command: "python skills/limit_up/scripts/analyzer.py --all --save"
    description: "更新午盘涨停股票数据"
    
  # 收盘数据汇总 (15:05)
  - name: "收盘涨停数据汇总"
    schedule: "5 15 * * 1-5"  # 周一至周五 15:05
    enabled: true
    command: "python skills/limit_up/scripts/analyzer.py --all --save"
    description: "生成收盘涨停分析报告"
    
  # 历史数据清理 (每周日凌晨)
  - name: "历史数据清理"
    schedule: "0 0 * * 0"  # 每周日 00:00
    enabled: true
    command: "find ~/.openclaw/stock/data/history -name '*.json' -mtime +90 -delete"
    description: "清理90天前的历史数据"

# 任务执行配置
execution:
  timeout: 300  # 任务超时时间(秒)
  retry: 3      # 失败重试次数
  retry_delay: 60  # 重试延迟(秒)
  
  # 通知配置
  notification:
    on_success: false
    on_failure: true
    channels: ["console", "log"]

# 节假日休市配置（自动跳过）
