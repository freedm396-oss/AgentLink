# 缩量回踩均线策略评分权重配置
# 参考涨停板策略的市场评分标准
# 总权重应为 100%

version: "1.1.0"

weights:
  retrace_quality: 0.25     # 回踩质量 (25%)
  volume_shrink: 0.20       # 缩量程度 (20%)
  trend_strength: 0.20      # 趋势强度 (20%)
  stop_signal: 0.15         # 止跌信号 (15%)
  support_strength: 0.15    # 支撑强度 (15%)
  market_environment: 0.05  # 市场环境 (5%)

# 回踩质量评分标准
retrace_quality:
  excellent: 100    # 精准回踩均线±1%
  good: 85          # 回踩均线±2%
  normal: 70        # 回踩均线±3%
  fair: 55          # 回踩均线±5%
  poor: 0           # 偏离均线>5%

# 缩量程度评分标准
volume_shrink:
  extreme: 100      # 缩量至30%以下
  strong: 85        # 缩量至40%以下
  normal: 70        # 缩量至50%以下
  mild: 55          # 缩量至60%以下
  none: 0           # 缩量不足60%

# 趋势强度评分标准
trend_strength:
  strong: 100       # MA20>MA60且斜率>30度
  good: 85          # MA20>MA60且斜率>15度
  normal: 70        # MA20>MA60但斜率平缓
  weak: 40          # 均线纠缠
  poor: 0           # MA20<MA60

# 止跌信号评分标准
stop_signal:
  strong: 100       # 锤子线+缩量
  good: 85          # 十字星+缩量
  normal: 70        # 小阳线+缩量
  weak: 40          # 无明显止跌信号
  none: 0           # 继续下跌

# 支撑强度评分标准
support_strength:
  strong: 100       # 均线斜率>30度+多次测试
  good: 85          # 均线斜率>15度
  normal: 70        # 均线平缓
  weak: 40          # 均线向下
  none: 0           # 跌破均线

# 市场环境评分标准（参考涨停板策略）
market_environment:
  excellent: 100    # 大盘大涨，情绪极好
  good: 80          # 大盘上涨，情绪良好
  normal: 60        # 大盘震荡，情绪中性
  poor: 40          # 大盘下跌，情绪低迷
  bad: 20           # 大盘大跌，情绪极差

# 评分等级（与涨停板策略一致）
categories:
  excellent:
    min_score: 85
    label: "极高"
    description: "缩量回踩信号强烈，重点关注"
  good:
    min_score: 75
    label: "高"
    description: "缩量回踩可能性大"
  average:
    min_score: 65
    label: "中等"
    description: "需结合盘面判断"
  poor:
    min_score: 55
    label: "低"
    description: "谨慎参与"
  very_poor:
    min_score: 0
    label: "极低"
    description: "建议观望"

# 数据缓存配置
cache:
  ttl_minutes: 5                   # 缓存有效期（分钟）
  max_history_days: 90             # 历史数据保留天数
