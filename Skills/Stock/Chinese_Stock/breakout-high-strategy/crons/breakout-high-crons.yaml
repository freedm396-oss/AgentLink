# crons/breakout-high-crons.yaml

version: "1.0.0"
description: "突破前期高点策略定时任务"

crons:
  # 收盘后扫描 - 15:30
  - name: "afternoon-breakout-scan"
    schedule: "30 15 * * 1-5"
    agent: "breakout-high-agent"
    enabled: true
    prompt: |
      扫描今日出现突破前期高点的股票。
      重点关注：
      1. 放量突破的股票
      2. 突破幅度较大的股票
      3. 均线多头配合的股票
      输出前10只评分最高的股票。
  
  # 次日确认监控 - 9:45
  - name: "next-day-breakout-confirmation"
    schedule: "45 9 * * 1-5"
    agent: "breakout-high-agent"
    enabled: true
    prompt: |
      监控昨日突破股票今日表现。
      重点关注：
      1. 是否继续上涨
      2. 是否出现回踩
      3. 成交量是否持续
  
  # 回踩买入监控 - 14:30
  - name: "pullback-buy-opportunity"
    schedule: "30 14 * * 1-5"
    agent: "breakout-high-agent"
    enabled: true
    prompt: |
      监控突破后回踩到位的股票。
      检查：
      1. 回踩是否缩量
      2. 是否获得支撑
      3. 是否出现买入信号

execution:
  timeout: 300
  retry: 3
  notification:
    on_success: false
    on_failure: true