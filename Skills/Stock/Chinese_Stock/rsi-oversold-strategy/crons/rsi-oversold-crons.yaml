# crons/rsi-oversold-crons.yaml

version: "1.0.0"
description: "RSI超卖反弹策略定时任务"

crons:
  # 早盘扫描 - 9:30
  - name: "morning-rsi-scan"
    schedule: "30 9 * * 1-5"
    agent: "rsi-oversold-agent"
    enabled: true
    prompt: |
      扫描今日出现RSI超卖的股票。
      重点关注：
      1. RSI<30的股票
      2. 股价偏离20日线较大的股票
      3. 出现企稳K线形态的股票
      输出前10只评分最高的股票。
  
  # 盘中监控 - 13:00
  - name: "intraday-rsi-monitor"
    schedule: "0 13 * * 1-5"
    agent: "rsi-oversold-agent"
    enabled: true
    prompt: |
      监控RSI超卖股票盘中表现。
      重点关注：
      1. 是否出现企稳信号
      2. 是否有资金介入迹象
      3. 是否出现买入机会
  
  # 收盘扫描 - 15:30
  - name: "afternoon-rsi-scan"
    schedule: "30 15 * * 1-5"
    agent: "rsi-oversold-agent"
    enabled: true
    prompt: |
      扫描今日收盘后RSI超卖的股票。
      包括：
      1. 今日RSI值及变化
      2. 成交量特征
      3. K线形态
      输出明日重点关注股票。

execution:
  timeout: 300
  retry: 3
  notification:
    on_success: false
    on_failure: true