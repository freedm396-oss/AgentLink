# ma-bullish-strategy/crons/ma-bullish-crons.yaml

version: "v1.2.0"
description: "均线多头排列策略定时任务"

crons:
  # 早盘扫描 - 9:30执行
  - name: "morning-ma-scan"
    schedule: "30 9 * * 1-5"
    agent: "ma-bullish-agent"
    enabled: true
    prompt: |
      使用ma-bullish-strategy扫描今日早盘符合条件的股票。
      使用baostock数据源，分析最近交易日数据。
      重点关注：
      1. 均线多头排列良好的股票
      2. 开盘后成交量明显放大的股票
      3. 股价站上20日线的股票
      输出前10只评分最高的股票，附操作建议。
  
  # 午盘监控 - 13:00执行
  - name: "afternoon-ma-monitor"
    schedule: "0 13 * * 1-5"
    agent: "ma-bullish-agent"
    enabled: true
    prompt: |
      检查上午选出的均线多头排列股票是否有异动。
      使用baostock数据源分析最新行情。
      重点关注：
      1. 是否有新的突破信号
      2. 成交量是否持续放大
      3. 是否有回调买入机会
      输出需要重点关注的变化。
  
  # 收盘复盘 - 15:30执行
  - name: "daily-ma-review"
    schedule: "30 15 * * 1-5"
    agent: "ma-bullish-agent"
    enabled: true
    prompt: |
      生成今日均线多头排列策略完整复盘报告。
      使用baostock数据源分析今日行情。
      包括：
      1. 今日符合条件的所有股票及评分
      2. 持仓股票的技术状态更新
      3. 明日重点关注股票池
      4. 风险提示和仓位建议
      输出格式为Markdown，保存到reports目录。
  
  # 周度总结 - 周五16:00执行
  - name: "weekly-ma-summary"
    schedule: "0 16 * * 5"
    agent: "ma-bullish-agent"
    enabled: true
    prompt: |
      生成本周均线多头排列策略周报。
      使用baostock数据源分析本周行情。
      包括：
      1. 本周信号统计（发出信号数、成功率）
      2. 持仓股票周度表现
      3. 策略周度收益
      4. 下周市场展望
      5. 策略参数优化建议

# 任务执行配置
execution:
  timeout: 600  # 任务超时时间(秒)
  retry: 3      # 失败重试次数
  retry_delay: 60  # 重试延迟(秒)
  
  # 通知配置
  notification:
    on_success: false
    on_failure: true
    channels: ["console", "log"]
